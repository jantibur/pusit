<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>PUSIT: Terminal</title>
	<script defer src="./script.js"></script>
    <script defer src="./alpine.min.js"></script>
	<link rel="stylesheet" href="./styles.css">	
</head>

<body x-data="{ open: false, page: 'home' }">
<div x-data="{
        open: false,
        message: '',
        fields: { val1: '', val2: '', val3: '' },
        labels: { label1: '', label2: '', label3: '' },
        callback: null
     }"
     @open-input.window="
        message = $event.detail.message;
        labels = $event.detail.labels;
        fields = { val1: '', val2: '', val3: '' };
        callback = $event.detail.callback;
        open = true; 
        $nextTick(() => { $refs.modalInput1 && $refs.modalInput1.focus() });
     "

     x-cloak>

        <div x-show="open" 
             x-transition.opacity
             style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998;"
             @click="open = false">
        </div>

        <div x-show="open"
             x-transition:enter="transition ease-out duration-200"
             x-transition:enter-start="opacity-0 scale-95"
             x-transition:enter-end="opacity-100 scale-100"
             style="
                position: fixed;
                top: 40%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: white;
                padding: 24px;
                border-radius: 12px;
                box-shadow: 0 10px 30px rgba(0,0,0,0.2);
                text-align: center;
                z-index: 9999;
                width: 85%;
                max-width: 320px;
             "
        >
            <h3 style="margin: 0 0 12px 0; font-size: 1.2rem;" x-text="message"></h3>
            
            <template x-if="labels.label1">
                <div>
                    <div style="text-align: left; margin-bottom: 5px; color: #6b7280; font-size: 0.8rem; font-weight: bold;" x-text="labels.label1"></div>
                    <input type="text"
                           x-ref="modalInput1"
                           x-model="fields.val1"
                           style="width: 100%; padding: 12px; margin-bottom: 15px; border: 1px solid #ccc; border-radius: 8px; font-size: 16px; box-sizing: border-box; outline: none; background: #f9fafb;">
                </div>
            </template>
            
            <template x-if="labels.label2">
                <div>
                    <div style="text-align: left; margin-bottom: 5px; color: #6b7280; font-size: 0.8rem; font-weight: bold;" x-text="labels.label2"></div>
                    <input type="number" 
                           x-model="fields.val2"
                           style="
                              width: 100%;
                              padding: 12px;
                              margin-bottom: 20px;
                              border: 1px solid #ccc;
                              border-radius: 8px;
                              font-size: 16px;
                              box-sizing: border-box;
                              outline: none;
                              background: #f9fafb;
                           ">
                </div>
            </template>

            <template x-if="labels.label3">
                <div>
                    <div style="text-align: left; margin-bottom: 5px; color: #6b7280; font-size: 0.8rem; font-weight: bold;" x-text="labels.label3"></div>
                    <input type="number" 
                           x-model="fields.val3"
                           style="
                              width: 100%;
                              padding: 12px;
                              margin-bottom: 20px;
                              border: 1px solid #ccc;
                              border-radius: 8px;
                              font-size: 16px;
                              box-sizing: border-box;
                              outline: none;
                              background: #f9fafb;
                           ">
                </div>
            </template>
            <button @click="callback(fields); open = false;"
                    style="
                        width: 100%;
                        padding: 12px;
                        border: none;
                        border-radius: 8px;
                        background: #2563eb;
                        color: white;
                        font-weight: bold;
                        font-size: 1rem;
                        cursor: pointer;
                    "
            >
                OK
            </button>
        </div>
    </div>

    <div x-data="{ open: false, message: '' }"
         @show-message.window="message = $event.detail; open = true;"
         @close-message.window="open = false"
         x-cloak>

        <div x-show="open" 
             x-transition.opacity
             style="position: fixed; inset: 0; background: rgba(0,0,0,0.5); z-index: 9998;"
             @click="open = false">
        </div>

        <div x-show="open"
             x-transition:enter="transition ease-out duration-300"
             x-transition:enter-start="opacity-0 scale-90"
             x-transition:enter-end="opacity-100 scale-100"
             style="
                position: fixed;
                top: 50%;
                left: 50%;
                transform: translate(-50%, -50%);
                background: #ffffff;
                padding: 24px;
                border-radius: 16px;
                box-shadow: 0 20px 25px -5px rgba(0, 0, 0, 0.1);
                text-align: center;
                z-index: 9999;
                width: 85%;
                max-width: 400px;
                color: #1f2937;
             "
        >
            <h3 style="margin-top: 0; font-size: 1.25rem;">README</h3>
            <p x-text="message" style="margin-bottom: 24px; line-height: 1.5; color: #4b5563;"></p>
            
            <button @click="open = false"
                    style="
                        width: 100%;
                        padding: 12px;
                        border: none;
                        border-radius: 10px;
                        background: #2563eb;
                        color: white;
                        font-size: 1rem;
                        font-weight: 600;
                        cursor: pointer;
                    "
            >
                OK
            </button>
        </div>
    </div>

    <header>
		<div class="nav-inner">
			<div class="hamburger" @click="open = !open">
				<span></span>
				<span></span>
				<span></span>
			</div>
			<div class="logo">🛠️ CONTROLLER</div>
		</div>
		
		<div class="menu" x-show="open" x-transition @click.outside="open = false">
			<a @click="page='home'; open = false"><strong>🏠 HOME</strong></a>
			<a @click="page='product'; open = false"><strong>🐙 PRODUCT</strong></a> 
			<a @click="page='transaction'; open = false"><strong>🧾 TRANSACTION</strong></a>
            <a @click="page='card'; open = false"><strong>💳 CARD</strong></a> 
			<a @click="page='balance'; open = false"><strong>🏦 BALANCE</strong></a>
        </div>
	</header>

	<main>
		<section x-show="page === 'home'">
            Server Statistics
        </section>	
		<section x-show="page === 'product'" x-data="product_handler()">
            <div class="product-statistics">
                <div id="product-created">
                    <h3>PRODUCT</h3>
                    <hr>
                    <h1 id="product-created-text" style="padding-top: 50px;">-</h1>
                </div>
            </div>

            <button class="button-product-create" @click="add_product"><strong>➕ ADD</strong></button>
            <button class="button-product-add-inventory" @click="add_product_inventory" style="margin-top: 24px;"><strong>➕ INVENTORY</strong></button>
        </section>	
		<section x-show="page === 'transaction'">
		   Products Configuration
        </section>	
        <section x-show="page === 'card'" x-data="card_handler()">
            <div class="card-statistics">
                <div id="card-created">
                    <h3>CREATED</h3>
                    <hr>
                    <h1 id="card-created-text" style="padding-top: 50px;">-</h1>
                </div>
                
                <div id="card-lost">
                    <h3>LOST</h3>
                    <hr>
                    <h1 id="card-lost-text" style="padding-top: 50px;">-</h1>
                </div>
            </div>

            <button class="button-card-create" @click="generate_card"><strong>➕ CREATE</strong></button>
            <button class="button-card-lost" @click="mark_as_lost" style="margin-top: 24px;"><strong>❌ LOST </strong></button>
        </section>
        <section x-show="page === 'balance'" x-data="balance_handler()">
            <div class="balance-statistics">
                <div id="total-balance">
                    <h3>TOTAL BALANCE</h3>
                    <hr>
                    <h1 id="total-balance-text" style="padding-top: 50px;" x-text="total_balance"></h1>
                </div>
            </div>

            <button class="button-add-balance" @click="add_balance"><strong>➕ ADD</strong></button>
        </section>
    </main>

	<footer>
  		© 2026 PUSIT • Open source (MIT) • <a href="https://github.com/jantibur/pusit">View Source</a>
	</footer>

</body>
</html>
