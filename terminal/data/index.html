<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>PUSIT: Terminal</title>
    <script defer src="/alpine.min.js"></script>
	<script defer src="/script.js"></script>
	<link rel="stylesheet" href="/styles.css">	
</head>

<body x-data="{ open: false, page: 'purchase' }">

	<!-- Navigation Bar -->
	<header>
		<!-- Navigation Bar Elements -->
		<div class="nav-inner">
			<div class="hamburger" @click="open = !open">
				<span></span>
				<span></span>
				<span></span>
			</div>

			<div class="logo">PUSIT</div>
		</div>
		
		<!-- Navigation Bar Logic -->
		<div class="menu" x-show="open" x-transition @click.outside="open = false">
			<a @click="page='purchase'; open = false">Buy</a>
			<a @click="page='deposit'; open = false">Cash-In</a>
			<a @click="page='balance'; open = false">Balance</a>
		</div>
	</header>

	<main>
		<!-- Products to Sell -->
		<section x-show="page === 'purchase'">	
		   available products (fetched from the root server);		
		</section>
		
		<!-- Put a balance in their RFID card -->
		<section x-show="page === 'deposit'">	
			add a balance to your rfid card
		</section>
		
		<!-- Check their balance -->
		<section x-show="page === 'balance'">
		    Check your rfid card balance
		</section>
		
	</main>

	<footer>
  		© 2026 PUSIT • Open source (MIT) • <a href="https://github.com/jantibur/pusit">View Source</a>
	</footer>

</body>

</html>
