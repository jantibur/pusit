<!DOCTYPE html>
<html>
<head>
	<meta charset="UTF-8"/>
	<meta name="viewport" content="width=device-width, initial-scale=1"/>
	<title>PUSIT: Terminal</title>
	<script defer src="./script.js"></script>
    <script defer src="./alpine.min.js"></script>
	<link rel="stylesheet" href="./styles.css">	
</head>

<body>
	<!-- Navigation Bar -->
	<header>
		<!-- Navigation Bar Elements -->
		<div class="nav-inner">

			<div class="logo">🦑 <strong>PUSIT</strong></div>
		</div>
	</header>

	<main x-data="handle_products()">
		<div x-init="get_products">
			<header class="app-bar">
				<h2 x-text="view === 'order' ? 'ORDER' : 'CART'"></h2>
				<button class="cart-toggle" @click="view = view === 'order' ? 'cart' : 'order'">
					🛒 <span class="badge" x-text="cart.length"></span>
				</button>
			</header>
			<div x-show="view === 'order'" class="product-grid">
				<template x-for="product in products" :key="product[0]">
					<div class="product-card">
						<div>
							<div class="product-name" x-text="product[1]" style="font-weight: bold;"></div>
							<div class="product-price" x-text="'₱' + product[2]"></div>
						</div>
						
						<button class="button-add-to-cart" @click="add_to_cart(product)">
							Add to Cart
						</button>
					</div>
				</template>
			</div>

			<div x-show="view === 'cart'" class="cart-page" style="padding-bottom: 100px;">
				<template x-if="cart.length === 0">
					<div style="text-align:center; padding: 60px 20px; color: #757575;">
						<div style="font-size: 50px; margin-bottom: 10px;">🛒</div>
						<p>Your cart is empty!</p>
						<button @click="view = 'order'" id="button-back-to-order">ORDER</button>
					</div>
				</template>

				<template x-for="(item, index) in cart" :key="index">
					<div class="cart-item">
						<div>
							<div x-text="item[1]" style="font-weight: bold; color: #212121;"></div>
							<div x-text="'₱' + item[2]" style="font-size: 14px; color: #757575;"></div>
						</div>
						<button @click="cart.splice(index, 1); get_cart_price()" style="color: #f44336; border: none; background: none; font-size: 12px; font-weight: bold; padding: 10px;">REMOVE</button>
					</div>
				</template>

				<div class="cart-footer" x-show="cart.length"> 
					<div>
						<div style="font-size: 12px; color: #757575; letter-spacing: 0.5px;">TOTAL</div>
						<div style="font-size: 20px; font-weight: bold; color: #212121;">₱<span x-text="cart_price"></span></div>
					</div>

					<button class="button-checkout" @click="process_order">ORDER</button>
				</div>
			</div>
		</div>	
	</main>

	<footer>
  		© 2026 PUSIT • Open source (MIT) • <a href="https://github.com/jantibur/pusit">View Source</a>
	</footer>

</body>

</html>
